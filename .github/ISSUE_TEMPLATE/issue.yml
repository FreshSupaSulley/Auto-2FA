name: General Issue
description: Click me to open an issue
body:
- type: checkboxes
  attributes:
    label: 'The "I tried" test'
    description: 'Please confirm the following:'
    options:
      - label: Auto 2FA is up-to-date on my machine
        required: true
      - label: There aren't any other open issues that talk about my issue
        required: true
      - label: I know the basics of how this extension works (see the [tutorial](https://github.com/FreshSupaSulley/Auto-2FA/blob/main/TUTORIAL.md))
        required: true
- type: textarea
  attributes:
    label: Body
    description: "Describe the problem you're having. Include any assets that may assist in understanding the issue (screenshots, error logs, example code, etc.)."
  validations:
    required: true